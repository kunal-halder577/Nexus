services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:  
      - ./backend/.env
    depends_on:
      - mongodb
  mongodb:
    image: mongo
    volumes:
      - mongo-data:/data/db
    env_file:
      - ./backend/.env
volumes:
  mongo-data: